services:
  peoplemanager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: peoplemanager
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DatabasePath: /data/people.db
    volumes:
      - peoplemanager-data:/data

volumes:
  peoplemanager-data:
    name: peoplemanager-data
